<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>P2P Vault · Secure Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* animated background decoration */
    body::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(240,185,11,0.15) 0%, rgba(240,185,11,0) 70%);
      top: -100px;
      right: -100px;
      border-radius: 50%;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(16,185,129,0.08) 0%, rgba(16,185,129,0) 70%);
      bottom: -150px;
      left: -150px;
      border-radius: 50%;
      pointer-events: none;
    }

    .login-container {
      width: 100%;
      max-width: 460px;
      z-index: 2;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(0px);
      border-radius: 40px;
      padding: 40px 32px 44px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(240, 185, 11, 0.1);
      transition: transform 0.2s ease;
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-icon {
      background: linear-gradient(135deg, #f7b90b, #facc15);
      width: 70px;
      height: 70px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
      box-shadow: 0 12px 20px -8px rgba(240, 185, 11, 0.4);
    }

    .brand-icon i {
      font-size: 34px;
      color: #0f172a;
    }

    .brand h1 {
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(135deg, #0f172a, #334155);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .brand p {
      font-size: 14px;
      color: #5b6e8c;
      margin-top: 6px;
      font-weight: 500;
    }

    .security-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f1f5f9;
      padding: 6px 14px;
      border-radius: 60px;
      font-size: 12px;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 28px;
      justify-content: center;
      width: auto;
    }

    .input-group {
      margin-bottom: 20px;
      position: relative;
    }

    .input-group i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 18px;
      pointer-events: none;
      transition: color 0.2s;
    }

    .input-group input {
      width: 100%;
      padding: 16px 20px 16px 50px;
      font-size: 15px;
      font-weight: 500;
      border: 2px solid #e2e8f0;
      border-radius: 28px;
      outline: none;
      background: #ffffff;
      transition: all 0.25s ease;
      font-family: 'Inter', sans-serif;
    }

    .input-group input:focus {
      border-color: #f0b90b;
      box-shadow: 0 0 0 3px rgba(240, 185, 11, 0.2);
    }

    .input-group input:focus + i {
      color: #f0b90b;
    }

    .login-btn {
      width: 100%;
      background: linear-gradient(105deg, #f0b90b, #facc15);
      border: none;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 40px;
      color: #0f172a;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 12px;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 6px 14px rgba(240, 185, 11, 0.3);
    }

    .login-btn:active {
      transform: scale(0.97);
    }

    .login-btn i {
      font-size: 18px;
    }

    .message-box {
      margin-top: 20px;
      padding: 12px;
      border-radius: 24px;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      background: #fef9e3;
      color: #b45309;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .message-box.show {
      display: flex;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0 20px;
      color: #cbd5e1;
      font-size: 12px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: #5b6e8c;
      margin-top: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .footer-note i {
      color: #f0b90b;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-card {
      animation: fadeInUp 0.5s ease-out;
    }

    /* loading state */
    .login-btn.loading {
      pointer-events: none;
      opacity: 0.8;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 32px 24px 38px;
      }
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">
        <i class="fas fa-exchange-alt"></i>
      </div>
      <h1>P2P Vault</h1>
      <p>Secure access · Binance style</p>
    </div>

    <div style="text-align: center; margin-bottom: 8px;">
      <div class="security-badge">
        <i class="fas fa-shield-alt" style="color:#10b981;"></i> <span>Encrypted connection · VIP level 2</span>
      </div>
    </div>

    <div class="input-group">
      <i class="fas fa-envelope"></i>
      <input type="email" id="email" placeholder="Email address" autocomplete="email">
    </div>

    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    </div>

    <button class="login-btn" id="loginBtn">
      <i class="fas fa-arrow-right-to-bracket"></i> <span>Access Dashboard</span>
    </button>

    <div class="message-box" id="msgBox">
      <i class="fas fa-circle-exclamation"></i>
      <span id="msgText"></span>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span>P2P secured by Firebase</span>
      <div class="divider-line"></div>
    </div>

    <div class="footer-note">
      <i class="fas fa-fingerprint"></i>
      <span>Biometric ready · 2FA enabled account</span>
    </div>
  </div>
</div>

<script>
  // Firebase configuration (from provided credentials)
  const firebaseConfig = {
    apiKey: "AIzaSyA8qJwI0ZWV30JKq2eB8yv-LsMRjz6INLg",
    authDomain: "shreematkaboss.firebaseapp.com",
    projectId: "shreematkaboss",
    storageBucket: "shreematkaboss.firebasestorage.app",
    messagingSenderId: "1004401076062",
    appId: "1:1004401076062:web:e7e587eefd3483b7c5d1cf"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // DOM elements
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('loginBtn');
  const msgBox = document.getElementById('msgBox');
  const msgText = document.getElementById('msgText');

  // Helper: show message with style
  function showMessage(message, isError = true) {
    msgText.innerText = message;
    msgBox.classList.add('show');
    if (isError) {
      msgBox.style.background = "#fee2e2";
      msgBox.style.color = "#b91c1c";
    } else {
      msgBox.style.background = "#d1fae5";
      msgBox.style.color = "#065f46";
    }
    setTimeout(() => {
      msgBox.classList.remove('show');
    }, 4000);
  }

  // Loading state
  function setLoading(loading) {
    if (loading) {
      loginBtn.classList.add('loading');
      loginBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> <span>Authenticating...</span>';
    } else {
      loginBtn.classList.remove('loading');
      loginBtn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> <span>Access Dashboard</span>';
    }
  }

  // Login function with enhanced UX
  async function login() {
    const email = emailInput.value.trim();
    const password = passwordInput.value;

    // Basic validation
    if (!email) {
      showMessage('❄️ Please enter your email address', true);
      emailInput.focus();
      return;
    }
    if (!password) {
      showMessage('🔒 Password is required', true);
      passwordInput.focus();
      return;
    }

    setLoading(true);

    try {
      const userCredential = await auth.signInWithEmailAndPassword(email, password);
      const user = userCredential.user;
      console.log("✅ Login success:", user.email);
      
      // Optional: small success message before redirect
      showMessage("✓ Authentication successful! Redirecting to dashboard...", false);
      
      // Redirect to dashboard (update to your actual dashboard filename)
      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 800);
      
    } catch (error) {
      setLoading(false);
      let friendlyMessage = "Authentication failed. ";
      
      // Human-readable Firebase error messages
      switch (error.code) {
        case 'auth/user-not-found':
          friendlyMessage = "⚠️ No account found with this email. Please check your credentials.";
          break;
        case 'auth/wrong-password':
          friendlyMessage = "🔑 Incorrect password. Please try again.";
          break;
        case 'auth/invalid-email':
          friendlyMessage = "📧 Invalid email format. Use a valid email address.";
          break;
        case 'auth/too-many-requests':
          friendlyMessage = "⏳ Too many failed attempts. Please wait and try again later.";
          break;
        case 'auth/network-request-failed':
          friendlyMessage = "🌐 Network error. Check your internet connection.";
          break;
        default:
          friendlyMessage = `❌ ${error.message}`;
      }
      showMessage(friendlyMessage, true);
    }
  }

  // Trigger login on Enter key
  const inputs = [emailInput, passwordInput];
  inputs.forEach(input => {
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        login();
      }
    });
  });

  // Attach click handler
  loginBtn.addEventListener('click', login);
  
  // Optional: prefill demo hint for VIP (not auto-filling for security but user-friendly)
  console.log("P2P Vault Login Ready — secure Firebase auth");
</script>

</body>
</html>
